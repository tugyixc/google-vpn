name: Build and Release Android APK

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Generate Gradle Wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: |
          if [ -z "${{ secrets.STORE_PASSWORD }}" ]; then
            echo "Release secrets not detected. Customizing release build type to use debug signing for workflow compatibility..."
            sed -i 's/signingConfig = signingConfigs.getByName("release")/signingConfig = signingConfigs.getByName("debugConfig")/g' app/build.gradle.kts
          fi
          ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_PATH }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Locate and Rename APKs
        run: |
          mkdir -p build-artifacts
          
          # Find and copy debug APK
          DEBUG_APK=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
          if [ -f "$DEBUG_APK" ]; then
            cp "$DEBUG_APK" build-artifacts/Phoenix_VPN_debug.apk
            echo "Copied Debug APK"
          fi
          
          # Find and copy release APK
          RELEASE_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -f "$RELEASE_APK" ]; then
            cp "$RELEASE_APK" build-artifacts/Phoenix_VPN_release.apk
            echo "Copied Release APK"
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Phoenix-VPN-APKs
          path: build-artifacts/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build-artifacts/Phoenix_VPN_debug.apk
            build-artifacts/Phoenix_VPN_release.apk
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
